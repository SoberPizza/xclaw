repos:
  # 通用文件检查
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.7.0
    hooks:
      - id: trailing-whitespace
        name: 移除行末空格
      - id: end-of-file-fixer
        name: 修复文件末尾缺失换行符
      - id: check-yaml
        name: 检查 YAML 格式
      - id: check-toml
        name: 检查 TOML 格式
      - id: check-json
        name: 检查 JSON 格式

  # Python 代码格式化和 Linting（Ruff）
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        name: Ruff - Python Linter
        args: [--fix]
      - id: ruff-format
        name: Ruff - Python Formatter
